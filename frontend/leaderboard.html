<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Coders - Leaderboard</title>
    <link rel="icon" href="img/plasma-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/leaderboard.css">
</head>
<body class="lb-body">
    <nav class="navbar navbar-expand-lg plasma-navbar fixed-top p-0">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <div class="navbar-brand d-flex align-items-center m-0">
                <button class="nav-btn-logo">
                <span>Combat Coders</span>
                </button>
            </div>

            <div class="d-flex align-items-center gap-3 nav-links-wrap">
                <button class="home-btn" onclick="playSFX('sound-fx/click.mp3');navigate('home')">Home</button>
                <button class="play-btn" onclick="playSFX('sound-fx/click.mp3'); navigate('play')">Play</button> 
                <button class="leaderboard-btn" onclick="playSFX('sound-fx/click.mp3');navigate('leaderboard')">Leaderboard</button>
                <button class="learn-btn" onclick="playSFX('sound-fx/click.mp3');navigate('learn')">Learn</button>
                
            </div>

            <!-- Profile trigger with circular avatar -->
            <div class="profile-trigger-container" id="profileContainer">
                <button class="prof-icon" id="profTrigger" type="button">
                    <img src="img/icon-prof.png" alt="Profile" id="navProfileIcon">
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="dropdown-item" onclick="window.location.href='profile.html'">Account</button>
                    <button class="dropdown-item" onclick="switchTheme()">Switch Theme</button>
                    <button class="dropdown-item" onclick="navigateToSettings()">Settings</button>
                    <button class="dropdown-item" onclick="signOut()">Sign out</button>
                </div>
            </div>

            <button class="mobile-nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation">
                <img src="img/plasma-logo.png" alt="Team Plasma Menu" class="brainrot-logo">
                <span>Team Plasma</span>
            </button>
        </div>
    </nav>

    <div class="lb-wrapper">
        <div class="lb-title-box">
            <h2 class="pixel-font">LEADERBOARD</h2>
        </div>

        <div class="lb-container">
            <div class="lb-row lb-header">
                <span class="lb-col-rank">RANK</span>
                <span class="lb-col-name">PLAYER NAME</span>
                <span class="lb-col-score">SCORE</span>
            </div>

            <div id="leaderboard-content" class="lb-scroll-area">
                </div>

            <form id="leaderboardForm" action="#" method="POST" class="mt-4">
                <div class="d-flex justify-content-center">
                    <button type="button" onclick="window.location.href='index.html'" class="btn-pixel">BACK TO MENU</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/account.js"></script>
    <script src="js/script.js"></script>
    <script src="js/api-connection.js"></script>
    <script src="js/login.js"></script>
    <script src="js/leaderboard-logic.js"></script>
    <script src="js/game-timer.js"></script>
    <script src="js/audio-manager.js"></script>
    <script>
    
    function updateNavbarAvatar() {
        const savedAvatar = localStorage.getItem('playerAvatar') || 'img/icon-prof.png';
        const navProfileIcon = document.getElementById('navProfileIcon');
        
        if (navProfileIcon) {
            navProfileIcon.src = savedAvatar;
            navProfileIcon.style.width = '40px';
            navProfileIcon.style.height = '40px';
            navProfileIcon.style.borderRadius = '50%';
            navProfileIcon.style.objectFit = 'cover';
            navProfileIcon.style.border = '2px solid #FFD700';
            navProfileIcon.style.imageRendering = 'auto';
        }
        
        
        const profTriggerImg = document.querySelector('#profTrigger img');
        if (profTriggerImg && profTriggerImg.id !== 'navProfileIcon') {
            profTriggerImg.src = savedAvatar;
            profTriggerImg.style.width = '40px';
            profTriggerImg.style.height = '40px';
            profTriggerImg.style.borderRadius = '50%';
            profTriggerImg.style.objectFit = 'cover';
            profTriggerImg.style.border = '2px solid #FFD700';
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateNavbarAvatar);
    } else {
        updateNavbarAvatar();
    }
    
    window.addEventListener('storage', function(e) {
        if (e.key === 'playerAvatar') {
            updateNavbarAvatar();
        }
    });

    function navigateToSettings() {
            if (window.location.pathname.includes('profile.html')) {
                if (isEditing) {
                    saveProfileUpdates();
                }
                document.getElementById('profileContainerPanel').classList.add('hidden');
                document.getElementById('settingsPanel').classList.remove('hidden');
                window.location.hash = 'settings';
            } else {
                window.location.href = 'profile.html#settings';
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
        const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
        
        const pageMap = {
            'home': 'home',
            'char-select': 'play',
            'load-slot': 'play',
            'learn': 'learn',
            'leaderboard': 'leaderboard'
        };
        
        const destination = pageMap[currentPage];
        if (destination) {
            const activeBtn = document.querySelector(`[onclick*="navigate('${destination}'"]`);
            if (activeBtn) {
                activeBtn.classList.add('active-page');
            }
        }
    });
</script>
</body>
</html>
