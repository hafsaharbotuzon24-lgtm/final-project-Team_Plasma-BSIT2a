<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Combat Coders - Leaderboard</title>
    <link rel="icon" href="img/CC-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/learn.css">
    <link rel="stylesheet" href="css/leaderboard.css">
    <style>
       .panel-switcher-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        /* Dark blue arrow buttons */
        .arrow-btn {
            background-color: #0b1a30;
            border: 2px solid #000000;
            color: #ffc107;
            font-size: 2rem;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-family: 'Pixelify Sans', sans-serif;
            transition: all 0.2s ease;
            box-shadow: 0 4px 0 #03070e;
            line-height: 1;
            user-select: none;
            padding: 0;
        }

        .arrow-btn:hover {
            background-color: #0f2440;
            color: #ffd966;
            transform: scale(1.05);
            border-color: #ffc107;
        }

        .arrow-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #03070e;
        }

        /* Current panel indicator badge */
        .panel-label-badge {
            font-family: 'Silkscreen', sans-serif;
            font-size: 1.2rem;
            color: #ffc107;
            background: #0b1a30;
            padding: 8px 24px;
            border-radius: 30px;
            border: 2px solid #000;
            letter-spacing: 1px;
            min-width: 160px;
            text-align: center;
        }

        /* Panel visibility control */
        .leaderboard-panel {
            display: block;
        }

        .leaderboard-panel.hidden-panel {
            display: none;
        }

        /* Second title box variant for quest mode */
        .lb-title-box.quest-title-box {
            /* identical to .lb-title-box, just used as selector target */
        }

        /* Responsive adjustments */
        @media (max-width: 500px) {
            .panel-label-badge {
                font-size: 1rem;
                min-width: 130px;
            }
            .arrow-btn {
                width: 44px;
                height: 44px;
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body class="lb-body">
    <nav class="navbar navbar-expand-lg plasma-navbar fixed-top p-0">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <div class="navbar-brand d-flex align-items-center m-0">
                <button class="nav-btn-logo">
                <span>Combat Coders</span>
                </button>
            </div>

            <div class="d-flex align-items-center gap-3 nav-links-wrap">
                <button class="home-btn" onclick="playSFX('sound-fx/click.mp3');navigate('home')">Home</button>
                <button class="play-btn" onclick="playSFX('sound-fx/click.mp3'); window.location.href='play-modes.html'">Play</button>
                <button class="leaderboard-btn" onclick="playSFX('sound-fx/click.mp3');navigate('leaderboard')">Leaderboard</button>
                <div class="learn-dropdown-container">
                    <button class="learn-btn" id="learnDropdownTrigger">Learn <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M5.83317 6.6665H4.1665V8.33317H5.83317V9.99984H7.49984V11.6665H9.1665V13.3332H10.8332V11.6665H12.4998V9.99984H14.1665V8.33317H15.8332V6.6665H14.1665V8.33317H12.4998V9.99984H10.8332V11.6665H9.1665V9.99984H7.49984V8.33317H5.83317V6.6665Z" fill="currentColor"/></svg></button>
                    <div class="learn-dropdown" id="learnDropdown">
                        <button class="dropdown-item" onclick="playSFX('sound-fx/click.mp3'); window.location.href='learn.html'">Mechanics</button>
                        <button class="dropdown-item" onclick="playSFX('sound-fx/click.mp3'); window.location.href='modules.html'">HTML Modules</button>
                    </div>
                </div>
            </div>

            <!-- Profile trigger with circular avatar -->
            <div class="profile-trigger-container" id="profileContainer">
                <button class="prof-icon" id="profTrigger" type="button">
                    <img src="img/icon-prof.png" alt="Profile" id="navProfileIcon">
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="dropdown-item" onclick="window.location.href='profile.html'"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px; vertical-align: middle;"><path fill-rule="evenodd" clip-rule="evenodd" d="M12.5007 1.66699H7.50065V3.33361H5.83419V8.33361H7.50085V3.33366H12.5007V1.66699ZM12.5007 8.33366H7.50065V10.0003H12.5007V8.33366ZM12.5009 3.33361H14.1675V8.33361H12.5009V3.33361ZM3.33398 13.3336H5.00065V11.667H15.0007V13.3337H5.00065V16.667H15.0008V13.3336H16.6675V18.3336H16.6673V18.3337H3.33398V18.3336V16.667V13.3336Z" fill="#64748B"/></svg>Account</button>
                    <button class="dropdown-item" onclick="navigateToSettings()"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px; vertical-align: middle;"><path fill-rule="evenodd" clip-rule="evenodd" d="M3.33366 3.3335H8.33366V5.8335H18.3337V7.50016H8.33366V10.0002H3.33366V7.50016H1.66699V5.8335H3.33366V3.3335ZM5.00033 5.00016V8.3335H6.66699V5.00016H5.00033ZM11.667 10.0002H16.667V12.5002H18.3337V14.1668H16.667V16.6668H11.667V14.1668H1.66699V12.5002H11.667V10.0002ZM13.3337 11.6668V15.0002H15.0003V11.6668H13.3337Z" fill="#64748B"/></svg>Settings</button>
                    <button class="dropdown-item" onclick="signOut()"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin-right: 8px; vertical-align: middle;"><path fill-rule="evenodd" clip-rule="evenodd" d="M2.16667 0.5H13.8333H15.5V2.16667V3.83333H13.8333V2.16667H2.16667V13.8333H13.8333V12.1667H15.5V13.8333V15.5H13.8333H2.16667H0.5V13.8333V2.16667V0.5H2.16667ZM15.5 7.16667H13.8333V5.5H12.1667V3.83333H10.5V5.5H12.1667V7.16667H3.83333V8.83333L12.1667 8.83333V10.5H10.5V12.1667H12.1667V10.5H13.8333V8.83333L15.5 8.83333V7.16667Z" fill="#64748B"/></svg>Sign out</button>
                </div>
            </div>

            <button class="mobile-nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation">
                <img src="img/plasma-logo.png" alt="Team Plasma Menu" class="brainrot-logo">
                <span>Team Plasma</span>
            </button>
        </div>
    </nav>

    <!-- 
      MAIN WRAPPER 
      =============
      Contains the golden title box (dynamic text), 
      the panel switcher arrows, and both leaderboard panels.
    -->
    <div class="lb-wrapper">
         
        <div class="lb-title-box" id="dynamicTitleBox">
            <h2 class="pixel-font text-center" id="dynamicTitleText">LEADERBOARD</h2>
        </div>

        <!-- Panel Switcher with dark blue clickable arrows -->
        <div class="panel-switcher-wrap">
            <button class="arrow-btn" id="prevPanelBtn" title="Previous leaderboard" type="button">◀</button>
            <span class="panel-label-badge text-center" id="panelNameDisplay">ADVENTURE</span>
            <button class="arrow-btn" id="nextPanelBtn" title="Next leaderboard" type="button">▶</button>
        </div>

        <div class="lb-container">
            <!-- 
              PANEL 1: ADVENTURE MODE LEADERBOARD 
              (initial version - the original leaderboard panel)
            -->
            <div id="adventurePanel" class="leaderboard-panel">
                <div class="lb-row lb-header">
                    <span class="lb-col-rank" style="text-align:center;">RANK</span>
                    <span class="lb-col-name" style="text-align:center;">PLAYER</span>
                    <span class="lb-col-score" style="text-align:center;">TIME</span>
                </div>
                <div id="leaderboard-content" class="lb-scroll-area">
                    <!-- Adventure leaderboard entries will be populated here -->
                </div>
            </div>

            <!-- 
              PANEL 2: QUEST MODE LEADERBOARD 
              (quest-mode.html leaderboard panel)
            -->
            <div id="questPanel" class="leaderboard-panel hidden-panel">
                <div class="lb-row lb-header">
                    <span class="lb-col-rank">RANK</span>
                    <span class="lb-col-name">PLAYER</span>
                    <span class="lb-col-score">TIME</span>
                </div>
                <div id="quest-leaderboard-content" class="lb-scroll-area">
                    <!-- Quest leaderboard entries will be populated here -->
                </div>
            </div>

            <form id="leaderboardForm" action="#" method="POST" class="mt-4">
                <div class="d-flex justify-content-center">
                    <button type="button" onclick="window.location.href='index.html'" class="btn-pixel">BACK TO MENU</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="js/api-connection.js"></script>
    <script src="js/account.js"></script>
    <script src="js/script.js"></script>
    <script src="js/login.js"></script>
    <script src="js/leaderboard-logic.js"></script>
    <script src="js/game-timer.js"></script>
    <script src="js/audio-manager.js"></script>
    <script>
    
    function updateNavbarAvatar() {
        const savedAvatar = localStorage.getItem('playerAvatar') || 'img/icon-prof.png';
        const navProfileIcon = document.getElementById('navProfileIcon');
        
        if (navProfileIcon) {
            navProfileIcon.src = savedAvatar;
            navProfileIcon.style.width = '40px';
            navProfileIcon.style.height = '40px';
            navProfileIcon.style.borderRadius = '50%';
            navProfileIcon.style.objectFit = 'cover';
            navProfileIcon.style.border = '2px solid #FFD700';
            navProfileIcon.style.imageRendering = 'auto';
        }
        
        
        const profTriggerImg = document.querySelector('#profTrigger img');
        if (profTriggerImg && profTriggerImg.id !== 'navProfileIcon') {
            profTriggerImg.src = savedAvatar;
            profTriggerImg.style.width = '40px';
            profTriggerImg.style.height = '40px';
            profTriggerImg.style.borderRadius = '50%';
            profTriggerImg.style.objectFit = 'cover';
            profTriggerImg.style.border = '2px solid #FFD700';
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateNavbarAvatar);
    } else {
        updateNavbarAvatar();
    }
    
    window.addEventListener('storage', function(e) {
        if (e.key === 'playerAvatar') {
            updateNavbarAvatar();
        }
    });

    function navigateToSettings() {
            if (window.location.pathname.includes('profile.html')) {
                if (isEditing) {
                    saveProfileUpdates();
                }
                document.getElementById('profileContainerPanel').classList.add('hidden');
                document.getElementById('settingsPanel').classList.remove('hidden');
                window.location.hash = 'settings';
            } else {
                window.location.href = 'profile.html#settings';
            }
        }
        document.addEventListener('DOMContentLoaded', function() {
        const currentPage = window.location.pathname.split('/').pop().replace('.html', '');
        
        const pageMap = {
            'home': 'home',
            'char-select': 'play',
            'load-slot': 'play',
            'learn': 'learn',
            'leaderboard': 'leaderboard'
        };
        
        const destination = pageMap[currentPage];
        if (destination) {
            const activeBtn = document.querySelector(`[onclick*="navigate('${destination}'"]`);
            if (activeBtn) {
                activeBtn.classList.add('active-page');
            }
        }
    });

    // =============================================
    // PANEL SWITCHER LOGIC
    // =============================================
    // Handles: 
    //   - Clicking ◀ / ▶ to cycle between ADVENTURE and QUEST MODE panels
    //   - Updating the golden title box text:
    //       ADVENTURE → "LEADERBOARD"
    //       QUEST     → "LEADERBOARD - QUEST MODE"
    //   - Updating the indicator badge text
    // =============================================
    (function() {
        const adventurePanel = document.getElementById('adventurePanel');
        const questPanel = document.getElementById('questPanel');
        const panelNameDisplay = document.getElementById('panelNameDisplay');
        const dynamicTitleText = document.getElementById('dynamicTitleText');
        const prevBtn = document.getElementById('prevPanelBtn');
        const nextBtn = document.getElementById('nextPanelBtn');

        // Current panel state
        let currentPanel = 'adventure'; // 'adventure' or 'quest'

        function updateUIForPanel(panelType) {
            if (panelType === 'adventure') {
                // Show adventure, hide quest
                adventurePanel.classList.remove('hidden-panel');
                questPanel.classList.add('hidden-panel');
                
                // Update badge and title
                panelNameDisplay.textContent = 'ADVENTURE';
                dynamicTitleText.textContent = 'LEADERBOARD';
            } else {
                // Show quest, hide adventure
                questPanel.classList.remove('hidden-panel');
                adventurePanel.classList.add('hidden-panel');
                
                // Update badge and title
                panelNameDisplay.textContent = 'QUEST MODE';
                dynamicTitleText.textContent = 'LEADERBOARD';
            }
            currentPanel = panelType;
        }

        // Initialize with ADVENTURE visible
        updateUIForPanel('adventure');

        // Left arrow click → toggle to the OTHER panel
        prevBtn.addEventListener('click', function() {
            if (currentPanel === 'adventure') {
                updateUIForPanel('quest');
            } else {
                updateUIForPanel('adventure');
            }
        });

        // Right arrow click → toggle to the OTHER panel
        nextBtn.addEventListener('click', function() {
            if (currentPanel === 'adventure') {
                updateUIForPanel('quest');
            } else {
                updateUIForPanel('adventure');
            }
        });

        // Optional: keyboard arrow support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevBtn.click();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextBtn.click();
            }
        });
    })();

    // Fallback for navigate function (if not defined by external scripts)
    if (typeof navigate !== 'function') {
        window.navigate = function(page) {
            const pages = {
                'home': 'index.html',
                'leaderboard': 'leaderboard.html',
                'play': 'play-modes.html'
            };
            if (pages[page]) window.location.href = pages[page];
        };
    }

    // Fallback for playSFX (if not defined)
    if (typeof playSFX !== 'function') {
        window.playSFX = function(src) {
            // Audio placeholder - no logic added
        };
    }
</script>
</body>
</html>
