        (function() {
     
    function handleOrientationChange() {
        const editor = document.getElementById('codeInput');
        if (editor) {
            editor.style.height = 'auto';
            setTimeout(() => {
                const wrapper = editor.parentElement;
                if (wrapper) {
                    editor.style.height = (wrapper.clientHeight - 40) + 'px';
                }
            }, 100);
        }
    }
    
    window.addEventListener('orientationchange', handleOrientationChange);
    window.addEventListener('resize', handleOrientationChange);
    
     
    const resultModal = document.getElementById('resultModal');
    const skipModal = document.getElementById('skipModal');
    
    function lockScroll(modal) {
        if (modal && modal.style.display === 'flex') {
            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';
            document.body.style.width = '100%';
        }
    }
    
    function unlockScroll() {
        document.body.style.overflow = '';
        document.body.style.position = '';
        document.body.style.width = '';
    }
   
    const originalShowResult = showResult;
    showResult = function(success, message) {
        originalShowResult(success, message);
        lockScroll(document.getElementById('resultModal'));
    };
    

    const originalCloseResult = closeResult;
    closeResult = function() {
        originalCloseResult();
        unlockScroll();
    };
    
   
    const originalSkipLevel = skipLevel;
    skipLevel = function() {
        originalSkipLevel();
        lockScroll(document.getElementById('skipModal'));
    };
    
    const originalCancelSkip = cancelSkip;
    cancelSkip = function() {
        originalCancelSkip();
        unlockScroll();
    };
    
    const originalConfirmSkip = confirmSkip;
    confirmSkip = function() {
        originalConfirmSkip();
        unlockScroll();
    };
    
    let touchStartY = 0;
    const gameMain = document.querySelector('.game-main');
    
    if (gameMain) {
        gameMain.addEventListener('touchstart', function(e) {
            touchStartY = e.touches[0].clientY;
        }, {passive: true});
        
        gameMain.addEventListener('touchend', function(e) {
            const touchEndY = e.changedTouches[0].clientY;
            const diff = touchEndY - touchStartY;
          
        }, {passive: true});
    }
    
    document.querySelectorAll('.action-btn').forEach(btn => {
        btn.addEventListener('touchstart', function() {
            this.style.transform = 'scale(0.95)';
        }, {passive: true});
        
        btn.addEventListener('touchend', function() {
            this.style.transform = '';
        }, {passive: true});
    });
})();

        ];

        // Game State
        let currentLevel = 1;
        let completedLevels = JSON.parse(localStorage.getItem('questCompletedLevels')) || [];

        const API_BASE_Q = window.API_BASE_URL || 'http://localhost:5000';

        async function mergeQuestFromServer() {
            var token = localStorage.getItem('authToken');
            if (!token) return;
            try {
                var r = await fetch(API_BASE_Q + '/api/players/me', {
                    headers: { Authorization: 'Bearer ' + token },
                    credentials: 'include'
                });
                if (!r.ok) return;
                var p = await r.json();
                var server = Array.isArray(p.questCompletedLevels) ? p.questCompletedLevels : [];
                var local = completedLevels.slice();
                completedLevels = Array.from(new Set(local.concat(server))).sort(function(a, b) { return a - b; });
                localStorage.setItem('questCompletedLevels', JSON.stringify(completedLevels));
                completedLevels.forEach(function(lid) {
                    localStorage.setItem('quest' + lid + 'Completed', 'true');
                });
            } catch (e) {
                console.warn('Quest progress merge failed:', e);
            }
        }

        async function pushQuestToServer() {
            var token = localStorage.getItem('authToken');
            if (!token) return;
            try {
                await fetch(API_BASE_Q + '/api/players/me/learning-progress', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        Authorization: 'Bearer ' + token
                    },
                    credentials: 'include',
                    body: JSON.stringify({ questCompletedLevels: completedLevels })
                });
            } catch (e) {
                console.warn('Quest progress sync failed:', e);
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            mergeQuestFromServer().then(function() {
                startLevel(1);
                setupDropdowns();
            });
        });

        function setupDropdowns() {
            const learnTrigger = document.getElementById('learnDropdownTrigger');
            const learnDropdown = document.getElementById('learnDropdown');
            const profileDropdown = document.getElementById('profileDropdown');

            if (learnTrigger && learnDropdown) {
                learnTrigger.addEventListener('click', function(e) {
                    e.stopPropagation();
                    learnDropdown.classList.toggle('show');
                    if (profileDropdown) profileDropdown.classList.remove('show');
                });
            }

            document.addEventListener('click', function() {
                if (learnDropdown) learnDropdown.classList.remove('show');
                if (profileDropdown) profileDropdown.classList.remove('show');
            });
        }

        function generateStarter(fullHtml) {
            var hasStyle = fullHtml.indexOf('<style>') !== -1;
            var hasScript = fullHtml.indexOf('<script>') !== -1;
            var starter = '<!DOCTYPE html>\n<html>\n<head>\n';
            if (hasStyle) starter += '    <style>\n\n    <' + '/style>\n';
            starter += '<' + '/head>\n<body>\n\n';
            if (hasScript) starter += '    <script>\n\n    <' + '/script>\n';
            starter += '<' + '/body>\n</html>';
            return starter;
        }

        function startLevel(levelId) {
            currentLevel = levelId;
            const level = levels.find(l => l.id === levelId);
            
            document.getElementById('gameScreen').style.display = 'flex';
            document.getElementById('questName').textContent = 'Level ' + levelId + ': ' + level.name;
            
            // Update difficulty badge
            const badge = document.getElementById('difficultyBadge');
            if (levelId <= 10) {
                badge.textContent = 'EASY';
                badge.className = 'difficulty-badge';
            } else if (levelId <= 20) {
                badge.textContent = 'INTERMEDIATE';
                badge.className = 'difficulty-badge intermediate';
            } else {
                badge.textContent = 'HARD';
                badge.className = 'difficulty-badge hard';
            }
            
            const editor = document.getElementById('codeInput');
            editor.value = generateStarter(level.html);
            
            // Show target
            const targetFrame = document.getElementById('targetFrame');
            const targetDoc = targetFrame.contentDocument || targetFrame.contentWindow.document;
            targetDoc.open();
            targetDoc.write(level.html);
            targetDoc.close();
            
            setupCodeEditor();
            updateLineNumbers();
        }

        function setupCodeEditor() {
            const textarea = document.getElementById('codeInput');
            const lineNumbers = document.getElementById('lineNumbers');
            
            textarea.addEventListener('input', updateLineNumbers);
            textarea.addEventListener('scroll', syncScroll);
            textarea.addEventListener('keydown', handleTab);
        }

        function refreshPreview() {
            const level = levels.find(l => l.id === currentLevel);
            if (level) {
                const targetFrame = document.getElementById('targetFrame');
                const targetDoc = targetFrame.contentDocument || targetFrame.contentWindow.document;
                targetDoc.open();
                targetDoc.write(level.html);
                targetDoc.close();
            }
        }

        function updateLineNumbers() {
            const textarea = document.getElementById('codeInput');
            const lineNumbers = document.getElementById('lineNumbers');
            const lines = textarea.value.split('\n').length;
            lineNumbers.innerHTML = Array.from({length: lines}, (_, i) => i + 1).join('<br>');
        }

        function syncScroll() {
            const textarea = document.getElementById('codeInput');
            const lineNumbers = document.getElementById('lineNumbers');
            lineNumbers.scrollTop = textarea.scrollTop;
        }

        function handleTab(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const textarea = document.getElementById('codeInput');
                const start = textarea.selectionStart;
                const end = textarea.selectionEnd;
                textarea.value = textarea.value.substring(0, start) + '  ' + textarea.value.substring(end);
                textarea.selectionStart = textarea.selectionEnd = start + 2;
                updateLineNumbers();
            }
        }

        function normalizeHTML(html) {
            return html.toLowerCase().replace(/\s+/g, ' ').replace(/>\s+</g, '><').trim();
        }

        function submitCode() {
            const userCode = document.getElementById('codeInput').value.trim();
            const level = levels.find(l => l.id === currentLevel);
            
            if (!userCode) {
                showResult(false, 'Please write some HTML code first!');
                return;
            }
            
            const normalizedUser = normalizeHTML(userCode);
            const normalizedTarget = normalizeHTML(level.html);
            
            // Check if code matches
            const isMatch = normalizedUser === normalizedTarget || checkSimilarity(userCode, level.html);
            
            if (isMatch) {
                if (!completedLevels.includes(currentLevel)) {
                    completedLevels.push(currentLevel);
                    localStorage.setItem('quest' + currentLevel + 'Completed', 'true');
                    localStorage.setItem('questCompletedLevels', JSON.stringify(completedLevels));
                    pushQuestToServer();
                }
                showResult(true, `Great job! You completed Level ${currentLevel}: ${level.name}`);
            } else {
                showResult(false, 'Your code doesn\'t match the target. Keep trying!');
            }
        }

        function checkSimilarity(user, target) {
            const userLower = user.toLowerCase();
            const targetLower = target.toLowerCase();
            
            const requiredTags = ['<!doctype html>', '<html', '<head', '<title', '<body'];
            for (const tag of requiredTags) {
                if (!userLower.includes(tag)) return false;
            }
            
            const targetTags = targetLower.match(/<[a-z]+[^>]*>/g) || [];
            const userTags = userLower.match(/<[a-z]+[^>]*>/g) || [];
            
            let matchCount = 0;
            for (const tag of targetTags) {
                const tagName = tag.match(/<[a-z]+/)?.[0];
                if (tagName && userTags.some(ut => ut.includes(tagName))) {
                    matchCount++;
                }
            }
            
            return matchCount >= targetTags.length * 0.7;
        }

        function showResult(success, message) {
            const modal = document.getElementById('resultModal');
            const content = document.getElementById('resultContent');
            
            content.className = 'result-content ' + (success ? 'success' : 'fail');
            const isFinalLevel = currentLevel === levels.length;
            content.innerHTML = success ? `
                <i class="fas fa-${isFinalLevel ? 'flag-checkered' : 'trophy'} result-icon"></i>
                <h3 class="result-title">${isFinalLevel ? 'Quest Complete!' : 'Level Complete!'}</h3>
                <p>${message}${isFinalLevel ? '<br><br><strong>Congratulations! You have completed all 25 levels!</strong>' : ''}</p>
                <div class="result-actions">
                    <button class="action-btn btn-submit" onclick="nextLevel()">
                        <i class="fas fa-${isFinalLevel ? 'home' : 'arrow-right'}"></i> ${isFinalLevel ? 'Return to Play Modes' : 'Next Level'}
                    </button>
                    ${isFinalLevel ? '' : '<button class="action-btn btn-quit" onclick="backToLevels()"><i class="fas fa-list"></i> Level Select</button>'}
                </div>
            ` : `
                <i class="fas fa-times-circle result-icon"></i>
                <h3 class="result-title">Try Again!</h3>
                <p>${message}</p>
                <div class="result-actions">
                    <button class="action-btn btn-submit" onclick="closeResult()">
                        <i class="fas fa-redo"></i> Try Again
                    </button>
                </div>
            `;
            
            modal.style.display = 'flex';
        }

        function closeResult() {
            document.getElementById('resultModal').style.display = 'none';
        }

        function nextLevel() {
            closeResult();
            if (currentLevel < levels.length) {
                startLevel(currentLevel + 1);
            } else {
                // Quest complete
                window.location.href = 'play-modes.html';
            }
        }

        function prevLevel() {
            if (currentLevel > 1) {
                startLevel(currentLevel - 1);
            } else {
                backToLevels();
            }
        }

        function skipLevel() {
            document.getElementById('skipModal').style.display = 'flex';
        }

        function confirmSkip() {
            document.getElementById('skipModal').style.display = 'none';
            nextLevel();
        }

        function cancelSkip() {
            document.getElementById('skipModal').style.display = 'none';
        }

        function backToLevels() {
            closeResult();
            window.location.href = 'play-modes.html';
        }
    </script>
</body>
</html>
