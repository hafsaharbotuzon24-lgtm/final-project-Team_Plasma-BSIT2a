<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Coders</title>
    <script>
        // Redirect BEFORE page renders if animation already played or authenticated
        const authToken = localStorage.getItem('authToken');
        const animationPlayed = sessionStorage.getItem('animationPlayed');
        
        if (animationPlayed || authToken) {
            const nextPage = authToken ? "home.html" : "login.html";
            window.location.replace(nextPage);
        }
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #020617;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-wrapper {
            position: relative;
            width: 550px;
            height: 550px;
            display: flex;
            justify-content: center;
            align-items: center;
            filter: drop-shadow(0 0 30px rgba(100, 200, 255, 0.3));
            animation: glow 2s ease-in-out infinite;

            opacity: 0;
            transition: opacity 0.3s ease-out; 
        }

        .logo-wrapper.show {
            opacity: 1;
        }

        @keyframes glow {
            0%, 100% {
                filter: drop-shadow(0 0 30px rgba(100, 200, 255, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 50px rgba(100, 200, 255, 0.6));
            }
        }

        .logo-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .logo-wrapper {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-wrapper" id="logoWrapper">
        <img src="img/LOGO ANIM.gif" alt="Team Plasma Logo" id="logoImg">
    </div>

<script>
window.addEventListener("load", () => {
    const logoWrapper = document.getElementById('logoWrapper');
    const logoImg = document.getElementById('logoImg');

    const GIF_DURATION = 1000; 
    const FADE_DURATION = 100;

    // Show the logo
    logoWrapper.classList.add('show');

    const originalSrc = logoImg.getAttribute("src");
    logoImg.src = originalSrc + "?t=" + Date.now();

    // Mark animation as played
    sessionStorage.setItem('animationPlayed', 'true');

    // After animation ends, fade out
    setTimeout(() => {
        logoWrapper.style.opacity = "0";
    }, GIF_DURATION);
    
    // Then redirect to login
    setTimeout(() => {
        window.location.replace("login.html");
    }, GIF_DURATION + FADE_DURATION);
});
</script>

</body>
</html>
