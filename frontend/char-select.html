<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Coders - Character Select</title>
    <link rel="icon" href="img/plasma-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Pixelify+Sans:wght@400..700&family=Tiny5&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/char-select.css">
    
</head>
<body class="char-select-page" style="background-image: url('img/bg-main.png');">
    <nav class="navbar navbar-expand-lg plasma-navbar fixed-top p-0">
        <div class="container-fluid d-flex justify-content-between align-items-center px-4">
            <div class="navbar-brand d-flex align-items-center m-0">
                <button class="nav-btn-logo" onclick="navigate('home')">
                <span>Combat Coders</span>
                </button>
            </div>

            <div class="d-flex align-items-center gap-3 nav-links-wrap">
                <button class="home-btn" onclick="playSFX('sound-fx/click.mp3');navigate('home')">Home</button>
                <button class="play-btn" onclick="playSFX('sound-fx/click.mp3'); navigate('play')">Play</button> 
                <button class="leaderboard-btn" onclick="playSFX('sound-fx/click.mp3');navigate('leaderboard')">Leaderboard</button>
                <button class="learn-btn" onclick="playSFX('sound-fx/click.mp3');navigate('learn')">Learn</button> 
            </div>

            <!-- Profile trigger with circular avatar -->
            <div class="profile-trigger-container" id="profileContainer">
                <button class="prof-icon" id="profTrigger" type="button">
                    <img src="img/icon-prof.png" alt="Profile" id="navProfileIcon">
                </button>
                <div class="profile-dropdown" id="profileDropdown">
                    <button class="dropdown-item" onclick="window.location.href='profile.html'">Account</button>
                    <button class="dropdown-item" onclick="switchTheme()">Switch Theme</button>
                    <button class="dropdown-item" onclick="window.location.href='settingsPanel.html'">Settings</button>
                    <button class="dropdown-item" onclick="signOut()">Sign out</button>
                </div>
            </div>

            <button class="mobile-nav-toggle" type="button" aria-expanded="false" aria-label="Toggle navigation">
                <img src="img/plasma-logo.png" alt="Team Plasma Menu" class="brainrot-logo">
                <span>Team Plasma</span>
            </button>
        </div>
    </nav>

    <div class="character-display">
        <div id="charCarousel" class="carousel slide" data-bs-ride="false">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="row">
                        <div class="col-md-5">
                            <div class="char-role">
                                <img id="role-scroll" src="img/banner-webdesigner.png" alt="Role">
                            </div>
                            <div class="char-model-container">
                                <img id="char-sprite" 
                                    src="img/witch-model.png" 
                                    class="char-model" 
                                    alt="Character Model">
                            </div>
                        </div>

                        <div class="col-md-7">
                            <div class="info-container slab-textfield">
                                <div class="bio-section">
                                    <h2 class="bioLabel">Bio:</h2>
                                    <p id="char-bio" class="bioText"></p>
                                </div>
                                
                                <div class="stats-section mt-4">
                                    <h2 class="stats-label">Stats:</h2>
                                    <div id="stats-container">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <button class="carousel-control-prev char-arrow" type="button" data-bs-target="#charCarousel" data-bs-slide="prev" onclick="playSFX('sound-fx/click.mp3');prevChar()">
                <img src="img/arrow-prev.png" alt="Previous">
            </button>
            <button class="carousel-control-next char-arrow" type="button" data-bs-target="#charCarousel" data-bs-slide="next" onclick="playSFX('sound-fx/click.mp3');nextChar()">
                <img src="img/arrow-next.png" alt="Next">
            </button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="scroll-btn-enter" onclick="navigate('game')">
            <span>Enter</span>
        </button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/account.js"></script>
    <script src="js/script.js"></script>
    <script src="js/audio-manager.js"></script>
    <script src="js/char-catalogue.js"></script>
    <script>
    
    function updateNavbarAvatar() {
        const savedAvatar = localStorage.getItem('playerAvatar') || 'img/icon-prof.png';
        const navProfileIcon = document.getElementById('navProfileIcon');
        
        if (navProfileIcon) {
            navProfileIcon.src = savedAvatar;
            navProfileIcon.style.width = '40px';
            navProfileIcon.style.height = '40px';
            navProfileIcon.style.borderRadius = '50%';
            navProfileIcon.style.objectFit = 'cover';
            navProfileIcon.style.border = '2px solid #FFD700';
            navProfileIcon.style.imageRendering = 'auto';
        }
        
        
        const profTriggerImg = document.querySelector('#profTrigger img');
        if (profTriggerImg && profTriggerImg.id !== 'navProfileIcon') {
            profTriggerImg.src = savedAvatar;
            profTriggerImg.style.width = '40px';
            profTriggerImg.style.height = '40px';
            profTriggerImg.style.borderRadius = '50%';
            profTriggerImg.style.objectFit = 'cover';
            profTriggerImg.style.border = '2px solid #FFD700';
        }
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', updateNavbarAvatar);
    } else {
        updateNavbarAvatar();
    }
    
    window.addEventListener('storage', function(e) {
        if (e.key === 'playerAvatar') {
            updateNavbarAvatar();
        }
    });
</script>
</body>
</html>
