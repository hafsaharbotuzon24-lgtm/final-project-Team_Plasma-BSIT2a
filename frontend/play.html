<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Coders - Game</title>
    <link rel="icon" href="img/plasma-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/play.css">
    <link rel="stylesheet" href="css/style.css">
     
</head>
<body class="play-page container-fluid">
    <div class="status-container">
        <div class="stat-box">
            <img src="img/icon-heart.png" alt="Hearts"> 
            <span id="heartCount" class="pixel-font text-white">3</span>
        </div>
        <div class="stat-box">
            <img src="img/icon-hint.png" alt="Hints"> 
            <span id="hintCount" class="pixel-font text-white">1</span>
        </div>
    </div>

    <div class="timer-display">
        <span class="timer-icon">⏱️</span>
        <span id="gameTimer" class="timer-value">0:00</span>
    </div>

    <div id="saveActionContainer" style="display: none;" onclick="triggerSaveFlow()">
        <img src="img/icon-save.png" alt="Save Game">
    </div>

    <div class="container text-center mt-5">
        <h1 class="pixel-font text-white mb-5">Give it your best shot, Adventurer!</h1>
        <div id="selectionRow" class="d-flex justify-content-center gap-4"></div>
    </div>

    <div class="modal fade" id="gameModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div id="modalContentWrapper" class="modal-content bg-transparent border-0"></div>
        </div>
    </div>

    <div class="modal fade" id="saveConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-white bg-black rounded-0">
                <div class="modal-body text-center p-4">
                    <h2 class="pixel-font text-white">SAVE GAME?</h2>
                    <div class="mt-4">
                        <button class="btn btn-outline-light pixel-font me-2" onclick="executeGameSave()">YES</button>
                        <button class="btn btn-outline-danger pixel-font" data-bs-dismiss="modal">NO</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="saveSuccessModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-success bg-black rounded-0">
                <div class="modal-body text-center p-4">
                    <h2 class="pixel-font text-success">GAME SAVED</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="hintModal" tabindex="-1" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-dark rounded-0">
                <div class="modal-header bg-warning rounded-0">
                    <h5 class="modal-title pixel-font fw-bold">SYSTEM HINT</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light text-center p-4">
                    <p id="hintText" class="pixel-font fs-4 text-dark m-0"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-connection.js"></script>
    <script src="js/script.js"></script>
    <script src="js/account.js"></script>
    <script src="js/level-logic.js"></script>
    <script src="js/battle-logic.js"></script>
    <script src="js/battle-logic-l2.js"></script>
    <script src="js/leaderboard-logic.js"></script>
    <script src="js/battle-logic-l3.js"></script>
    <script src="js/save-load.js"></script>
    <script>
    function getScopedLoadSaveSlot() {
        const playerId = localStorage.getItem('playerId');
        if (playerId) {
            const scoped = localStorage.getItem(`loadSaveSlot:${playerId}`);
            if (scoped) return scoped;
        }
        return localStorage.getItem('loadSaveSlot');
    }

    // NOW gameState exists - sync character and level immediately from save
    (function() {
        // Check if loading from save first (save data takes priority)
        const savedData = getScopedLoadSaveSlot();
        if (savedData) {
            try {
                const saveData = JSON.parse(savedData);
                if (typeof gameState !== 'undefined') {
                    // Load character
                    if (saveData.character) {
                        gameState.character = saveData.character;
                        localStorage.setItem('selectedCharacter', saveData.character);
                        console.log('Character loaded from save:', saveData.character);
                    }
                    // Load level and site
                    if (saveData.currentLevel) {
                        gameState.currentLevel = saveData.currentLevel;
                        console.log('Level loaded from save:', saveData.currentLevel);
                    }
                    if (saveData.currentSite) {
                        gameState.currentSite = saveData.currentSite;
                        console.log('Site loaded from save:', saveData.currentSite);
                    }
                    // Load hearts and hints
                    if (typeof saveData.hearts !== 'undefined') {
                        gameState.hearts = saveData.hearts;
                    }
                    if (typeof saveData.hints !== 'undefined') {
                        gameState.hints = saveData.hints;
                    }
                    return; 
                }
            } catch(e) {
                console.error('Error pre-loading save data:', e);
            }
        }
        
        // No save data - use localStorage character
        const savedChar = localStorage.getItem('selectedCharacter');
        if (savedChar && typeof gameState !== 'undefined') {
            gameState.character = savedChar;
            console.log('Character synced to gameState:', savedChar);
        }
    })();
    
    // Check for saved game data on page load BEFORE timer initializes
    (function() {
        const savedData = getScopedLoadSaveSlot();
        if (savedData) {
            try {
                const saveData = JSON.parse(savedData);
                if (saveData.gameTime && saveData.gameTime > 0) {
                    window._pendingGameTime = saveData.gameTime;
                    console.log('Pending game time detected:', saveData.gameTime, 'seconds');
                }
            } catch(e) {
                console.error('Error parsing save data:', e);
            }
        }
    })();
    
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof applyLoadedSave === 'function') {
            applyLoadedSave();
        }
    });
    </script>
    <script src="js/battle-logic.js"></script>
    <script src="js/instructions-logic.js"></script>
    <script src="js/hint-logic.js"></script>
    <script src="js/room-logic.js"></script>
    <script src="js/save.js"></script>
    <script src="js/game-timer.js"></script>
    <script>
    if (typeof show === 'undefined') {
        window.show = function() {};
    }
    // Clear timer state when navigating away from play.html
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.home-btn, .play-btn, .leaderboard-btn, .learn-btn, .settings-btn, .prof-icon').forEach(btn => {
            if (btn) {
                btn.addEventListener('click', function() {
                    if (typeof stopGameTimerAndClear === 'function') {
                        stopGameTimerAndClear();
                    }
                });
            }
        });
    });
    </script>
</body>
</html>
