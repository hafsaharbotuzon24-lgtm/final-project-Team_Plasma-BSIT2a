<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Coders - Game</title>
    <link rel="icon" href="img/plasma-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            overflow-y: auto;
            min-height: 100vh;
        }

        /* Fixed heart loss notification - stays visible when scrolling */
        #heartLossBox {
            position: fixed !important;
            top: 20px !important;
            left: 50% !important;
            transform: translateX(-50%) !important;
            z-index: 99999 !important;
        }
        
        #heartLossBox .bg-danger {
            animation: heartShake 0.5s ease-in-out;
        }
        
        @keyframes heartShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Save icon container - bottom right */
        #saveActionContainer {
            position: fixed !important;
            bottom: 20px !important;
            right: 20px !important;
            top: auto !important;
            left: auto !important;
            z-index: 1000;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 !important;
            padding: 10px !important;
        }

        #saveActionContainer:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 10px gold);
        }

        #saveActionContainer img {
            width: 50px;
            height: auto;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* Timer display */
        .timer-display {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.8);
            padding: 8px 16px;
            border-radius: 30px;
            font-family: 'Pixelify Sans', monospace;
            color: #ffd700;
            font-size: 1.3rem;
            font-weight: bold;
            z-index: 10000;
            border: 2px solid #ffd700;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        /* Status container */
        .status-container {
            position: fixed !important;
            top: 10px !important;
            left: 10px !important;
            z-index: 10000;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 15px;
            padding: 8px 15px !important;
            display: flex;
            gap: 20px;
        }

        .stat-box {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-box img {
            width: 30px;
            height: 30px;
        }

        .stat-box span {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Main container margin to prevent content from going under fixed elements */
        .container.text-center {
            margin-top: 80px !important;
            padding-bottom: 100px !important;
        }

        @media (max-width: 768px) {
            .timer-display {
                font-size: 1rem;
                padding: 5px 12px;
                top: 5px;
                right: 5px;
            }

            .status-container {
                top: 5px !important;
                left: 5px !important;
                padding: 5px 10px !important;
                gap: 10px;
            }

            .stat-box img {
                width: 25px;
                height: 25px;
            }

            .stat-box span {
                font-size: 1rem;
            }

            #saveActionContainer {
                bottom: 15px !important;
                right: 15px !important;
            }

            #saveActionContainer img {
                width: 40px;
            }

            .container.text-center {
                margin-top: 70px !important;
                padding-bottom: 80px !important;
            }
        }
    </style>
</head>
<body class="play-page container-fluid">
    <div class="status-container">
        <div class="stat-box">
            <img src="img/icon-heart.png" alt="Hearts"> 
            <span id="heartCount" class="pixel-font text-white">3</span>
        </div>
        <div class="stat-box">
            <img src="img/icon-hint.png" alt="Hints"> 
            <span id="hintCount" class="pixel-font text-white">1</span>
        </div>
    </div>

    <div class="timer-display">
        <span class="timer-icon">⏱️</span>
        <span id="gameTimer" class="timer-value">0:00</span>
    </div>

    <div id="saveActionContainer" style="display: none;" onclick="triggerSaveFlow()">
        <img src="img/icon-save.png" alt="Save Game">
    </div>

    <div class="container text-center mt-5">
        <h1 class="pixel-font text-white mb-5">Give it your best shot, Adventurer!</h1>
        <div id="selectionRow" class="d-flex justify-content-center gap-4"></div>
    </div>

    <div class="modal fade" id="gameModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div id="modalContentWrapper" class="modal-content bg-transparent border-0"></div>
        </div>
    </div>

    <div class="modal fade" id="saveConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-white bg-black rounded-0">
                <div class="modal-body text-center p-4">
                    <h2 class="pixel-font text-white">SAVE GAME?</h2>
                    <div class="mt-4">
                        <button class="btn btn-outline-light pixel-font me-2" onclick="executeGameSave()">YES</button>
                        <button class="btn btn-outline-danger pixel-font" data-bs-dismiss="modal">NO</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="saveSuccessModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-success bg-black rounded-0">
                <div class="modal-body text-center p-4">
                    <h2 class="pixel-font text-success">GAME SAVED</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="hintModal" tabindex="-1" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-dark rounded-0">
                <div class="modal-header bg-warning rounded-0">
                    <h5 class="modal-title pixel-font fw-bold">SYSTEM HINT</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light text-center p-4">
                    <p id="hintText" class="pixel-font fs-4 text-dark m-0"></p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/account.js"></script>
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof applyLoadedSave === 'function') {
            applyLoadedSave();
        }
    });
</script>
    <script src="js/level-logic.js"></script>
    <script src="js/instructions-logic.js"></script>
    <script>
    // Check for saved game data on page load BEFORE timer initializes
    (function() {
        const savedData = localStorage.getItem('loadSaveSlot');
        if (savedData) {
            try {
                const saveData = JSON.parse(savedData);
                if (saveData.gameTime && saveData.gameTime > 0) {
                    // Store the time to be applied after timer initializes
                    window._pendingGameTime = saveData.gameTime;
                    console.log('Pending game time detected:', saveData.gameTime, 'seconds');
                }
            } catch(e) {
                console.error('Error parsing save data:', e);
            }
        }
    })();
</script>
    <script src="js/hint-logic.js"></script>
    <script src="js/room-logic.js"></script>
    <script src="js/save-load.js"></script>
    <script src="js/save.js"></script>
    <script src="js/battle-logic.js"></script>
    <script src="js/battle-logic-l2.js"></script>
    <script src="js/battle-logic-l3.js"></script>
    <script src="js/game-timer.js"></script>
    <script>
    if (typeof show === 'undefined') {
    window.show = function() {};
}// Clear timer state when navigating away from play.html
    document.querySelectorAll('.home-btn, .play-btn, .leaderboard-btn, .learn-btn, .settings-btn, .prof-icon').forEach(btn => {
        if (btn) {
            btn.addEventListener('click', function() {
                if (typeof stopGameTimerAndClear === 'function') {
                    stopGameTimerAndClear();
                }
            });
        }
    });
</script>
</body>
</html>
