<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Coders - Game</title>
    <link rel="icon" href="img/CC-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/play.css">
    <link rel="stylesheet" href="css/style.css">
    <style> 
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            background: #1c3554;
            border: 2px solid #000;
            outline: none;
            cursor: pointer;
            padding: 12px 30px;
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 1.1rem;
            color: #ffffff;
            text-align: center;
            border-radius: 10px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .back-btn:hover {
            background: #1f3058;
            border-color: #17213a;
            transform: scale(1.05);
        }

        .back-btn:active {
            transform: scale(0.98);
            background: #152040;
        }

        /* Back Confirmation Modal Styles */
        #backConfirmModal .modal-content {
            background: linear-gradient(135deg, #1a2744 0%, #1c3554 100%);
            border: 3px solid #2a4a7f;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        #backConfirmModal .modal-body {
            padding: 40px 30px;
        }

        #backConfirmModal .modal-title {
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 1.5rem;
            color: #ffffff;
            text-align: center;
            margin-bottom: 30px;
        }

        #backConfirmModal .btn {
            font-family: 'Pixelify Sans', sans-serif;
            font-size: 1.1rem;
            padding: 12px 35px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            margin: 0 10px;
        }

        #backConfirmModal .btn-yes {
            background: #4a90d9;
            border: 2px solid #3a70b9;
            color: #ffffff;
        }

        #backConfirmModal .btn-yes:hover {
            background: #5aa0e9;
            border-color: #4a80c9;
            transform: scale(1.05);
        }

        #backConfirmModal .btn-no {
            background: #2a3a5a;
            border: 2px solid #1a2a4a;
            color: #ffffff;
        }

        #backConfirmModal .btn-no:hover {
            background: #3a4a6a;
            border-color: #2a3a5a;
            transform: scale(1.05);
        }

        /* Responsive Back Button */
        @media (max-width: 768px) {
            .back-btn {
                bottom: 20px;
                left: 20px;
                padding: 10px 25px;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .back-btn {
                bottom: 15px;
                left: 15px;
                padding: 8px 20px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="play-page container-fluid">
    <div class="status-container">
        <div class="stat-box">
            <img src="img/icon-heart.png" alt="Hearts"> 
            <span id="heartCount" class="pixel-font text-white">3</span>
        </div>
        <div class="stat-box">
            <img src="img/icon-hint.png" alt="Hints"> 
            <span id="hintCount" class="pixel-font text-white">1</span>
        </div>
    </div>

    <div class="timer-display">
        <span class="timer-icon">⏱️</span>
        <span id="gameTimer" class="timer-value">0:00</span>
    </div>

    <div id="saveActionContainer" style="display: none;" onclick="triggerSaveFlow()">
        <img src="img/icon-save.png" alt="Save Game">
    </div>

    <div class="container text-center mt-5">
        <h1 class="pixel-font text-white mb-5">Give it your best shot, Adventurer!</h1>
        <div id="selectionRow" class="d-flex justify-content-center gap-4"></div>
    </div>

    <!-- Back Button - Only visible during card selection -->
    <button class="back-btn" id="backButton" style="display: none;" onclick="showBackConfirmModal()">
        ← BACK
    </button>

    <!-- Back Confirmation Modal -->
    <div class="modal fade" id="backConfirmModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body text-center">
                    <h2 class="modal-title">Are you sure you want to go back?</h2>
                    <div class="mt-4">
                        <button class="btn btn-no" data-bs-dismiss="modal">NO</button>
                        <button class="btn btn-yes" onclick="goBackToLoadSlot()">YES</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="gameModal" tabindex="-1" data-bs-backdrop="static">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div id="modalContentWrapper" class="modal-content bg-transparent border-0"></div>
        </div>
    </div>

    <div class="modal fade" id="saveConfirmModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-white bg-black rounded-0">
                <div class="modal-body text-center p-4">
                    <h2 class="pixel-font text-white">SAVE GAME?</h2>
                    <div class="mt-4">
                        <button class="btn btn-outline-light pixel-font me-2" onclick="executeGameSave()">YES</button>
                        <button class="btn btn-outline-danger pixel-font" data-bs-dismiss="modal">NO</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="saveSuccessModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-success bg-black rounded-0">
                <div class="modal-body text-center p-4">
                    <h2 class="pixel-font text-success">GAME SAVED</h2>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="hintModal" tabindex="-1" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-dark rounded-0">
                <div class="modal-header bg-warning rounded-0">
                    <h5 class="modal-title pixel-font fw-bold">SYSTEM HINT</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light text-center p-4">
                    <p id="hintText" class="pixel-font fs-4 text-dark m-0"></p>
                </div>
            </div>
        </div>
    </div>

    <div id="battlePreviewModal" class="battle-preview-overlay hidden">
        <div class="battle-preview-modal-box">
            <div class="battle-preview-topbar">
                <span class="battle-preview-dot red"></span>
                <span class="battle-preview-dot yellow"></span>
                <span class="battle-preview-dot green"></span>
                <span class="battle-preview-label">Browser</span>
            </div>
            <div class="battle-preview-content">
                <h3 class="battle-preview-title">Code Output Preview</h3>
                <iframe id="battlePreviewFrame" class="battle-preview-frame" title="Battle code preview"></iframe>
                <pre id="battlePreviewCode" class="battle-preview-code"></pre>
            </div>
            <button class="btn btn-light pixel-font fs-5 m-3" onclick="closeBattlePreviewModal()">CLOSE PREVIEW</button>
        </div>
    </div>

    <script>
        // Back button functionality
        function showBackConfirmModal() {
            const backConfirmModal = new bootstrap.Modal(document.getElementById('backConfirmModal'));
            backConfirmModal.show();
        }

        function goBackToLoadSlot() {
            // Stop game timer if running
            if (typeof stopGameTimerAndClear === 'function') {
                stopGameTimerAndClear();
            }
            // Hide modal
            const backConfirmModal = bootstrap.Modal.getInstance(document.getElementById('backConfirmModal'));
            if (backConfirmModal) {
                backConfirmModal.hide();
            }
            // Navigate to load-slot.html
            window.location.href = 'load-slot.html';
        }

        // Show back button when card selection is visible
        function showBackButton() {
            document.getElementById('backButton').style.display = 'block';
        }

        function hideBackButton() {
            document.getElementById('backButton').style.display = 'none';
        }

        // Monitor for card selection visibility
        document.addEventListener('DOMContentLoaded', function() {
            // Create observer to watch for selection row content
            const observer = new MutationObserver(function(mutations) {
                const selectionRow = document.getElementById('selectionRow');
                if (selectionRow && selectionRow.children.length > 0) {
                    showBackButton();
                } else {
                    hideBackButton();
                }
            });

            const selectionRow = document.getElementById('selectionRow');
            if (selectionRow) {
                observer.observe(selectionRow, { 
                    childList: true,
                    subtree: true 
                });
                
                // Initial check
                if (selectionRow.children.length > 0) {
                    showBackButton();
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api-connection.js"></script>
    <script src="js/script.js"></script>
    <script src="js/battle-preview.js"></script>
    <script src="js/account.js"></script>
    <script src="js/level-logic.js"></script>
    <script src="js/battle-logic.js"></script>
    <script src="js/battle-logic-l2.js"></script>
    <script src="js/leaderboard-logic.js"></script>
    <script src="js/battle-logic-l3.js"></script>
    <script src="js/save-load.js"></script>
    <script>
    function getScopedLoadSaveSlot() {
        const playerId = localStorage.getItem('playerId');
        if (playerId) {
            const scoped = localStorage.getItem(`loadSaveSlot:${playerId}`);
            if (scoped) return scoped;
        }
        return localStorage.getItem('loadSaveSlot');
    }

    // NOW gameState exists - sync character and level immediately from save
    (function() {
        // Check if loading from save first (save data takes priority)
        const savedData = getScopedLoadSaveSlot();
        if (savedData) {
            try {
                const saveData = JSON.parse(savedData);
                if (typeof gameState !== 'undefined') {
                    // Load character
                    if (saveData.character) {
                        gameState.character = saveData.character;
                        localStorage.setItem('selectedCharacter', saveData.character);
                        console.log('Character loaded from save:', saveData.character);
                    }
                    // Load level and site
                    if (saveData.currentLevel) {
                        gameState.currentLevel = saveData.currentLevel;
                        console.log('Level loaded from save:', saveData.currentLevel);
                    }
                    if (saveData.currentSite) {
                        gameState.currentSite = saveData.currentSite;
                        console.log('Site loaded from save:', saveData.currentSite);
                    }
                    // Load hearts and hints
                    if (typeof saveData.hearts !== 'undefined') {
                        gameState.hearts = saveData.hearts;
                    }
                    if (typeof saveData.hints !== 'undefined') {
                        gameState.hints = saveData.hints;
                    }
                    return; 
                }
            } catch(e) {
                console.error('Error pre-loading save data:', e);
            }
        }
        
        // No save data - use localStorage character
        const savedChar = localStorage.getItem('selectedCharacter');
        if (savedChar && typeof gameState !== 'undefined') {
            gameState.character = savedChar;
            console.log('Character synced to gameState:', savedChar);
        }
    })();
    
    // Check for saved game data on page load BEFORE timer initializes
    (function() {
        const savedData = getScopedLoadSaveSlot();
        if (savedData) {
            try {
                const saveData = JSON.parse(savedData);
                if (saveData.gameTime && saveData.gameTime > 0) {
                    window._pendingGameTime = saveData.gameTime;
                    console.log('Pending game time detected:', saveData.gameTime, 'seconds');
                }
            } catch(e) {
                console.error('Error parsing save data:', e);
            }
        }
    })();
    
    document.addEventListener('DOMContentLoaded', function() {
        if (typeof applyLoadedSave === 'function') {
            applyLoadedSave();
        }
    });
    </script>
    <script src="js/battle-logic.js"></script>
    <script src="js/instructions-logic.js"></script>
     <script src="js/motd-logic.js"></script>
    <script src="js/hint-logic.js"></script>
    <script src="js/room-logic.js"></script>
    <script src="js/save.js"></script>
    <script src="js/game-timer.js"></script>
    <script>
    if (typeof show === 'undefined') {
        window.show = function() {};
    }
    // Clear timer state when navigating away from play.html
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.home-btn, .play-btn, .leaderboard-btn, .learn-btn, .settings-btn, .prof-icon').forEach(btn => {
            if (btn) {
                btn.addEventListener('click', function() {
                    if (typeof stopGameTimerAndClear === 'function') {
                        stopGameTimerAndClear();
                    }
                });
            }
        });
    });
    </script>
</body>
</html>
