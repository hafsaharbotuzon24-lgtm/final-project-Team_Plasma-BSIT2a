<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Combat Coders - Level 1</title>
    <link rel="icon" href="img/plasma-logo.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="play-page container-fluid">
    <div class="status-container position-absolute p-3 top-0 start-0">
    <div class="stat-box border border-dark border-4 bg-white p-2 mb-2">
        <img src="img/icon-heart.png" width="30"> <span id="heartCount" class="pixel-font fs-4">3</span>
    </div>
    <div class="stat-box border border-dark border-4 bg-white p-2">
        <img src="img/icon-hint.png" width="30"> <span id="hintCount" class="pixel-font fs-4">0</span>
    </div>
</div>

<div class="container text-center mt-5">
    <h1 class="pixel-font text-white mb-5">Choose well, Adventurer!</h1>
    <div id="selectionRow" class="d-flex justify-content-center gap-4"></div>
</div>

<div class="modal fade" id="gameModal" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div id="modalContentWrapper" class="modal-content bg-transparent border-0">
            </div>
    </div>
</div>

<div class="modal fade" id="hintModal" tabindex="-1" style="z-index: 1060;">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border border-4 border-dark rounded-0">
                <div class="modal-header bg-warning rounded-0">
                    <h5 class="modal-title pixel-font fw-bold">SYSTEM HINT</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body bg-light text-center p-4">
                    <p id="hintText" class="pixel-font fs-4 text-dark m-0"></p>
                </div>
            </div>
        </div>

        <div class="modal fade" id="noHintsModal" tabindex="-1" style="z-index: 1070;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border border-4 border-danger rounded-0 bg-black shadow-lg">
            <div class="modal-header border-0 justify-content-center">
                <h2 class="modal-title pixel-font text-danger text-uppercase">Buffer Empty</h2>
            </div>
            <div class="modal-body text-center p-4">
                <p class="pixel-font fs-4 text-white">No hints remaining in the system. You must solve this manually!</p>
                <img src="img/icon-hint.png" width="80" style="filter: grayscale(1) opacity(0.3);" class="my-3">
            </div>
            <div class="modal-footer border-0 justify-content-center">
                <button type="button" class="btn btn-outline-danger pixel-font px-4" data-bs-dismiss="modal">RETRY SEARCH</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/level1-logic.js"></script>
<script src="js/chest1-logic.js"></script>
<script src="js/room1-logic.js"></script>
<script src="js/battle1-logic.js"></script>
<script src="js/instructions1-logic.js"></script>
<script src="js/hint1-logic.js"></script>
</body>
</html>
